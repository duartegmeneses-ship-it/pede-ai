<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pede aí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!--
  ====================================================================
  CONFIGURAÇÃO — edita aqui o que precisares
  ====================================================================
  1) TOPIC: muda para um nome único e difícil de adivinhar.
     Ex.: "duarte-casa-x7k2q9". É este nome que liga esta página
     à app ntfy no teu iPhone.
  2) BOTOES: cada linha é um botão. "label" é o texto grande,
     "emoji" é o ícone, "msg" é o que aparece na notificação.
     Podes apagar, adicionar ou reordenar linhas à vontade.
-->
<script>
  const TOPIC = "duarte-casa-x29de25de06ago26";
  const BOTOES = [
    { emoji: "🍼", label: "Biberão",  msg: "Preciso do biberão" },
    { emoji: "🧷", label: "Fralda",   msg: "Preciso de uma fralda" },
    { emoji: "🍭", label: "Chucha",   msg: "Preciso da chucha" },
    { emoji: "👋", label: "Vem cá",   msg: "Vem cá, preciso de ajuda" },
  ];
</script>

<style>
  :root{
    --bg: #0d0a08;
    --bg-glow: #1a1108;
    --amber: #e0a25c;
    --amber-dim: #8a5a2c;
    --text: #f0e4d3;
    --text-dim: #a89786;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--bg-glow), var(--bg) 70%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overscroll-behavior: none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding: 8vh 6vw 6vh;
  }
  .nightlight{
    width:14px; height:14px; border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 24px 10px rgba(224,162,92,0.35);
    margin-bottom: 22px;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ opacity:.55; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.15); }
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(24px, 6vw, 32px);
    margin: 0 0 6px;
    letter-spacing: 0.2px;
  }
  .sub{
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 48px;
    text-align:center;
  }
  .grid{
    width:100%; max-width: 420px;
    display:grid; grid-template-columns: 1fr 1fr;
    gap:16px;
  }
  button.pedido{
    appearance:none; border:none;
    background: linear-gradient(180deg, #1c140b, #120d07);
    border: 1px solid rgba(224,162,92,0.25);
    border-radius: 20px;
    padding: 24px 12px;
    color: var(--text);
    font-family:'Inter', sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    font-size:15px; font-weight:500;
    min-height: 108px;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  button.pedido:active{ transform: scale(0.94); }
  button.pedido .emoji{ font-size: 32px; filter: grayscale(0.15); }
  button.pedido.enviado{
    border-color: var(--amber);
    background: linear-gradient(180deg, #2a1c0e, #1c140b);
  }
  .status{
    margin-top: 40px;
    height: 20px;
    font-size: 13px;
    color: var(--amber);
    opacity: 0;
    transition: opacity .3s ease;
  }
  .status.show{ opacity:1; }
  .rodape{
    margin-top:auto;
    padding-top: 40px;
    font-size: 11px;
    color: #4a3f33;
    text-align:center;
  }
</style>
</head>
<body>
  <div class="nightlight"></div>
  <h1>Pede aí</h1>
  <div class="sub">Toca no que precisas — ele recebe já a seguir.</div>

  <div class="grid" id="grid"></div>
  <div class="status" id="status">Enviado ✓</div>

  <div class="rodape">a sala está calma, sem luz branca 🌙</div>

<script>
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');
  let statusTimer = null;

  BOTOES.forEach(b => {
    const el = document.createElement('button');
    el.className = 'pedido';
    el.innerHTML = `<span class="emoji">${b.emoji}</span><span>${b.label}</span>`;
    el.addEventListener('click', () => enviar(el, b));
    grid.appendChild(el);
  });

  async function enviar(el, botao){
    el.classList.add('enviado');
    if (navigator.vibrate) navigator.vibrate(15);

    try{
      await fetch(`https://ntfy.sh/${TOPIC}`, {
        method: 'POST',
        headers: { 'Title': 'Pede aí' },
        body: botao.msg
      });
      mostrarStatus(`${botao.label} enviado ✓`);
    }catch(e){
      mostrarStatus('Falha a enviar — sem net?');
    }

    setTimeout(() => el.classList.remove('enviado'), 900);
  }

  function mostrarStatus(texto){
    status.textContent = texto;
    status.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => status.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
